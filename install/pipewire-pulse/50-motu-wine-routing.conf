# Route Wine/Proton audio to the MOTU stereo loopback sink.
# Wine's winepulse.drv rejects sinks with >18 channels, so the 22-channel
# pro-audio device cannot be used directly. This rule ensures all Wine
# processes target the 2-channel Main 1/2 loopback instead.
stream.rules = [
    {
        matches = [
            { application.process.binary = "wine64-preloader" }
            { application.process.binary = "wine-preloader" }
            { application.process.binary = "wine64" }
            { application.process.binary = "wine" }
        ]
        actions = {
            update-props = {
                target.object = "motu-main-12"
            }
        }
    }
]
